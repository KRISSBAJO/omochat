version: 1
applications:
  - appRoot: apps/web
    env:
      variables:
        AMPLIFY_MONOREPO_APP_ROOT: apps/web
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build --workspace @omochat/web
      artifacts:
        baseDirectory: apps/web/.next
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - apps/web/.next/cache/**/*
