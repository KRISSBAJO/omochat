services:
  postgres:
    image: postgres:16-alpine
    container_name: omochat-postgres
    environment:
      POSTGRES_USER: omochat
      POSTGRES_PASSWORD: omochat
      POSTGRES_DB: omochat
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "55433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omochat -d omochat"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: omochat-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: omochat-mailpit
    ports:
      - "11025:1025"
      - "18025:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
