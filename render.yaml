services:
  - type: web
    name: omochat-api
    runtime: node
    buildCommand: npm ci && npm run db:generate && npm run build --workspace @omochat/api
    preDeployCommand: npm run db:migrate:deploy
    startCommand: npm run start:prod --workspace @omochat/api
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: omochat-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: WEB_ORIGIN
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: COOKIE_SAME_SITE
        value: lax
      - key: COOKIE_SECURE
        value: "true"
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: MAIL_FROM
        value: Omochat <no-reply@example.com>
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_S3_PUBLIC_BASE_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_VERIFY_SERVICE_SID
        sync: false
      - key: WEB_PUSH_PUBLIC_KEY
        sync: false
      - key: WEB_PUSH_PRIVATE_KEY
        sync: false
      - key: WEB_PUSH_SUBJECT
        value: mailto:admin@example.com
      - key: TURN_URI
        sync: false
      - key: TURN_TLS_URI
        sync: false
      - key: TURN_USER
        sync: false
      - key: TURN_PASS
        sync: false
      - key: TURN_SHARED_SECRET
        sync: false
      - key: ANNOUNCED_IP
        sync: false
databases:
  - name: omochat-db
    databaseName: omochat
    user: omochat
